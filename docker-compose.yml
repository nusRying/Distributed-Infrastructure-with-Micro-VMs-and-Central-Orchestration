services:
  postgres:
    image: postgres:15
    container_name: vmm_postgres
    environment:
      POSTGRES_USER: vmm_user
      POSTGRES_PASSWORD: Umair@825
      POSTGRES_DB: vmm_db
    ports:
      - "5432:5432"
    volumes:
      - vmm_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vmm_redis
    ports:
      - "6379:6379"

volumes:
  vmm_postgres_data:
